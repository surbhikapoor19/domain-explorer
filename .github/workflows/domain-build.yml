name: Domain Build Pipeline

on:
  repository_dispatch:
    types: [domain-build, domain-switch]

jobs:
  build:
    if: github.event.action == 'domain-build'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: |
          pip install pandas scikit-learn umap-learn hdbscan sentence-transformers numpy requests
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install torch-geometric torch-scatter torch-sparse -f https://data.pyg.org/whl/torch-2.5.0+cpu.html
          pip install chromadb lxml beautifulsoup4

      - name: Set up GROBID
        run: |
          docker pull lfoppiano/grobid:0.8.1
          docker run -d --name grobid -p 8070:8070 lfoppiano/grobid:0.8.1
          echo "Waiting for GROBID to start..."
          for i in $(seq 1 30); do
            curl -s http://localhost:8070/api/isalive && break
            sleep 2
          done

      - name: Extract domain info
        id: domain
        run: |
          DOMAIN="${{ github.event.client_payload.domain }}"
          SLUG=$(echo "$DOMAIN" | tr '_' '-')
          echo "domain=$DOMAIN" >> $GITHUB_OUTPUT
          echo "slug=$SLUG" >> $GITHUB_OUTPUT
          echo "Building domain: $DOMAIN (slug: $SLUG)"

      - name: Unzip PDFs if needed
        run: |
          SLUG="${{ steps.domain.outputs.slug }}"
          if [ -f "datasets/${SLUG}/papers.zip" ]; then
            mkdir -p "datasets/${SLUG}/papers"
            unzip -o "datasets/${SLUG}/papers.zip" -d "datasets/${SLUG}/papers/"
            rm "datasets/${SLUG}/papers.zip"
            echo "Extracted PDFs to datasets/${SLUG}/papers/"
          fi

      - name: Run ingestion pipeline
        env:
          GROBID_URL: http://localhost:8070
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          HF_API_TOKEN: ${{ secrets.HF_API_TOKEN }}
        run: |
          DOMAIN="${{ steps.domain.outputs.domain }}"
          PAGES="${{ github.event.client_payload.pages }}"
          STEPS="grobid,rag,kg,hgt,precompute"
          if [ "$PAGES" = "explorer" ]; then
            STEPS="precompute"
          fi
          python scripts/ingest_domain.py --domain "$DOMAIN" --steps "$STEPS"

      - name: Commit results
        run: |
          DOMAIN="${{ steps.domain.outputs.domain }}"
          SLUG="${{ steps.domain.outputs.slug }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "datasets/${SLUG}/" "dashboard/public/data-${SLUG}/" "domains/${DOMAIN}.yaml" 2>/dev/null || true
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "Build domain: ${DOMAIN}

          Automated build via admin panel.
          Pipeline: GROBID -> RAG -> KG -> HGT -> Precompute"
          git push

      - name: Stop GROBID
        if: always()
        run: docker stop grobid 2>/dev/null || true

  switch:
    if: github.event.action == 'domain-switch'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Switch active domain
        run: |
          DOMAIN="${{ github.event.client_payload.domain }}"
          cd dashboard
          ./scripts/switch-domain.sh "$DOMAIN"

      - name: Commit switch
        run: |
          DOMAIN="${{ github.event.client_payload.domain }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/public/data/
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "Switch active domain to: ${DOMAIN}"
          git push
