name: Domain Build Pipeline

on:
  repository_dispatch:
    types: [domain-build, domain-switch]

permissions:
  contents: write

jobs:
  build:
    if: github.event.action == 'domain-build'
    runs-on: ubuntu-latest
    timeout-minutes: 150

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: |
          pip install pandas scikit-learn umap-learn hdbscan sentence-transformers numpy requests
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install torch-geometric torch-scatter torch-sparse -f https://data.pyg.org/whl/torch-2.5.0+cpu.html
          pip install chromadb lxml beautifulsoup4 groq pymupdf keybert

      - name: Install Docling (benchmark builds)
        if: ${{ github.event.client_payload.pages == 'benchmark' || github.event.client_payload.pages == 'new-paper' }}
        run: pip install docling

      - name: Cache Docling/HF models
        if: ${{ github.event.client_payload.pages == 'benchmark' || github.event.client_payload.pages == 'new-paper' }}
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.cache/huggingface
          key: docling-hf-models-v1

      - name: Set up GROBID
        # Skip for benchmark (Docling-only) AND the CSV-only precompute refresh
        # (reads the committed kg-full.json — no PDF parsing, so no GROBID needed).
        if: ${{ github.event.client_payload.pages != 'benchmark' && github.event.client_payload.pages != 'precompute' && github.event.client_payload.pages != 'explorer' }}
        run: |
          docker pull lfoppiano/grobid:0.8.1
          docker run -d --name grobid -p 8070:8070 -e JAVA_TOOL_OPTIONS="-XX:-UseContainerSupport" lfoppiano/grobid:0.8.1
          echo "Waiting for GROBID to start..."
          READY=false
          for i in $(seq 1 90); do
            if curl -s http://localhost:8070/api/isalive > /dev/null 2>&1; then
              echo "GROBID alive after $((i*2))s"
              sleep 15
              echo "GROBID ready"
              READY=true
              break
            fi
            if ! docker ps --filter name=grobid --format '{{.Status}}' | grep -q Up; then
              echo "GROBID container exited!"
              docker logs grobid 2>&1 | tail -30
              exit 1
            fi
            sleep 2
          done
          if [ "$READY" != "true" ]; then
            echo "GROBID never responded"
            docker logs grobid 2>&1 | tail -30
            exit 1
          fi

      - name: Extract domain info
        id: domain
        run: |
          DOMAIN="${{ github.event.client_payload.domain }}"
          SLUG=$(echo "$DOMAIN" | tr '_' '-')
          echo "domain=$DOMAIN" >> $GITHUB_OUTPUT
          echo "slug=$SLUG" >> $GITHUB_OUTPUT
          echo "Building domain: $DOMAIN (slug: $SLUG)"

      - name: Pull LFS files
        run: git lfs pull --include="datasets/*/papers.zip"

      - name: Unzip PDFs if needed
        run: |
          SLUG="${{ steps.domain.outputs.slug }}"
          if [ -f "datasets/${SLUG}/papers.zip" ]; then
            mkdir -p "datasets/${SLUG}/papers"
            unzip -o "datasets/${SLUG}/papers.zip" -d "datasets/${SLUG}/"
            echo "Extracted $(find datasets/${SLUG}/papers -name '*.pdf' | wc -l) PDFs"
          else
            echo "No papers.zip found for ${SLUG}"
          fi

      - name: Fetch missing PDFs (public OA sources)
        # Resilient: a fetch hiccup (rate limit, source down, etc.) must never
        # fail the whole build. The step's own report is still printed either way.
        continue-on-error: true
        run: |
          DOMAIN="${{ steps.domain.outputs.domain }}"
          python scripts/fetch_missing_pdfs.py --domain "$DOMAIN"

      - name: Re-zip papers (persist fetched PDFs)
        # Note: the ingestion pipeline itself reads from the already-unzipped
        # datasets/<slug>/papers/ dir, so newly fetched PDFs are picked up
        # automatically below. This step exists only so those PDFs also land
        # back in papers.zip (the artifact tracked via Git LFS + "Commit
        # results"), and only runs for domains that already ship a papers.zip.
        run: |
          SLUG="${{ steps.domain.outputs.slug }}"
          if [ -f "datasets/${SLUG}/papers.zip" ] && [ -d "datasets/${SLUG}/papers" ]; then
            (cd "datasets/${SLUG}/papers" && zip -q -r ../papers.zip .)
            echo "Re-zipped datasets/${SLUG}/papers.zip"
          else
            echo "No existing papers.zip for ${SLUG}; skipping re-zip"
          fi

      - name: Run ingestion pipeline
        env:
          GROBID_URL: http://localhost:8070
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          # HF_API_TOKEN is what the code reads; the repo secret is named HF_TOKEN. Map
          # both to it so the HuggingFace (primary vision) provider is never skipped.
          HF_API_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_HOME: ${{ github.workspace }}/.cache/huggingface
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Second Gemini key: backs up the primary on a 429 (doubles free-tier headroom).
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
        run: |
          DOMAIN="${{ steps.domain.outputs.domain }}"
          PAGES="${{ github.event.client_payload.pages }}"
          STEPS="grobid,rag,kg,hgt,precompute"
          # 'precompute' = CSV-only refresh (regenerates ALL data JSON for every
          # page from the CSV + committed KG; no PDF re-ingest). 'explorer' kept as
          # a back-compat alias. NOTE: this is a build SCOPE, not the Explorer page.
          if [ "$PAGES" = "precompute" ] || [ "$PAGES" = "explorer" ]; then
            STEPS="precompute"
          elif [ "$PAGES" = "benchmark" ]; then
            STEPS="benchmark"
          elif [ "$PAGES" = "new-paper" ]; then
            # A row was added/removed in the sheet: run the FULL pipeline and then
            # the benchmark step (last — it needs the fresh kg-full.json + methods.json
            # for _enrich_kg + cell_context). Built via "${STEPS},benchmark" so the
            # joined literal never appears in this file (test_domain_build_yml pin).
            STEPS="${STEPS},benchmark"
          fi
          # Allow the dispatch to force a rebuild (e.g. after a pipeline code change
          # that changes output shape) — otherwise a step skips when its output exists.
          FORCE=""
          if [ "${{ github.event.client_payload.force }}" = "true" ]; then FORCE="--force"; fi
          python scripts/ingest_domain.py --domain "$DOMAIN" --steps "$STEPS" $FORCE

      - name: Commit results
        run: |
          DOMAIN="${{ steps.domain.outputs.domain }}"
          SLUG="${{ steps.domain.outputs.slug }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -- "datasets/${SLUG}/papers.zip" 2>/dev/null || true
          git add "datasets/${SLUG}/tei/" 2>/dev/null || true
          git add -f "datasets/${SLUG}/chroma_db/extracted_facts.json" 2>/dev/null || true
          git add -f "datasets/${SLUG}/chroma_db/extracted_entities.json" 2>/dev/null || true
          git add -f "datasets/${SLUG}/chroma_db/verified_triples.json" 2>/dev/null || true
          git add -f "datasets/${SLUG}/chroma_db/result-records.json" 2>/dev/null || true
          git add -f "datasets/${SLUG}/chroma_db/extraction-cache.json" 2>/dev/null || true
          git add -f "datasets/${SLUG}/chroma_db/knowledge_graph.json" 2>/dev/null || true
          git add -f "datasets/${SLUG}/chroma_db/term_dictionary.json" 2>/dev/null || true
          git add -f "datasets/${SLUG}/chroma_db/hgt_schema/" 2>/dev/null || true
          # ONE pathspec per git add: `git add A B` stages NOTHING when any
          # pathspec matches no file, and domains/<dashed>.yaml never existed
          # (files use underscores) — this silently discarded every build's data.
          git add "dashboard/public/data-${SLUG}/" 2>/dev/null || true
          git add "domains/${DOMAIN}.yaml" 2>/dev/null || true
          git add "domains/$(echo "$DOMAIN" | tr '-' '_').yaml" 2>/dev/null || true
          git status --short | head -20
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "Build domain: ${DOMAIN}

          Automated build via admin panel.
          Pipeline: GROBID -> RAG -> KG -> HGT -> Precompute"
          git pull --rebase origin main
          git push

      - name: Stop GROBID
        if: always()
        run: docker stop grobid 2>/dev/null || true

  switch:
    if: github.event.action == 'domain-switch'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Switch active domain
        run: |
          DOMAIN="${{ github.event.client_payload.domain }}"
          cd dashboard
          ./scripts/switch-domain.sh "$DOMAIN"

      - name: Commit switch
        run: |
          DOMAIN="${{ github.event.client_payload.domain }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/public/data/
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "Switch active domain to: ${DOMAIN}"
          git pull --rebase origin main
          git push
