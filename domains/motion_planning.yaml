# Motion Planning domain config — the test domain for the multi-domain
# demo. Same role vocabulary as grasp_planning.yaml; different CSV
# columns mapped to the same higher-level roles.
#
# Once Phase 2 + 3 land, switching the active domain to motion_planning
# rebuilds the entire dashboard with motion-planning data, motion-planning
# branding, and motion-planning LLM prompts, with no code change.

domain: motion_planning
display_name: "Motion Explorer"
display_subject: "motion planning algorithms"
display_short: "motion planning"
ecosystem: "COMPARE Ecosystem"
tagline: "AI-in-the-Loop"
query_hint: 'Ask about motion planning algorithms, e.g., "RRT variants for high-DoF arms in cluttered workspaces"'
method_noun: "algorithm"

csv_path: datasets/motion-planning/motion_planning.csv
papers_dir: datasets/motion-planning/papers/

# Column -> role mapping. Sourced from the robot-manipulation.org
# Google Sheet (13 methods). Motion planning has fewer columns than
# grasp planning — no training data, backbone, sensor, or output shape.
columns:
  Name:                    { role: identity.name,        facet: identifier }
  Description:             { role: identity.description, facet: text }
  "Planning Type":         { role: method.family,        facet: categorical }
  Middleware:              { role: method.middleware,     facet: categorical }
  "IK/Controller":         { role: method.ik_controller, facet: categorical }
  "Link(s)":               { role: identity.code,        facet: url }
  Citation:                { role: identity.citation,    facet: text }
  "Year (Initial Release)": { role: identity.year,       facet: numeric }
  License:                 { role: meta.license,         facet: categorical }
  Language:                { role: meta.language,        facet: categorical }
  "Maintainer(s)":         { role: meta.maintainer,      facet: text }

# Motion-planning-specific LLM prompt overrides.
llm:
  domain_subject: "robotic motion planning"
  claim_extraction_focus:
    - "path-length and computation-time benchmarks against other planners"
    - "asymptotic optimality, completeness, and convergence guarantees"
    - "limitations specific to high-DoF systems, narrow passages, or dynamic obstacles"
    - "real-robot deployment results and constraints"
  query_rewrite_examples:
    - "RRT variants for narrow-passage environments"
    - "what optimization methods are used for trajectory smoothing"
    - "papers that benchmark on the MoveIt! pipeline or OMPL"

default_color_by_roles:
  - method.family
  - input.modality
  - hardware.platform
  - env.context

# Knowledge-graph entity normalization for motion planning. Maps the many
# surface forms found in papers to a single canonical label so the KG doesn't
# fragment one planner/robot/problem across spelling variants. Read by
# ingest_domain.py step_kg -> build_knowledge_graph(domain_config=...). A domain
# that omits this keeps the built-in grasp-planning defaults.
kg_aliases:
  technique:
    rrt: RRT
    "rrt-connect": RRT-Connect
    "rrt connect": RRT-Connect
    "rrt*": "RRT*"
    "rrt-star": "RRT*"
    "informed rrt*": "Informed RRT*"
    prm: PRM
    "prm*": "PRM*"
    lazyprm: LazyPRM
    "lazy prm": LazyPRM
    est: EST
    sbl: SBL
    kpiece: KPIECE
    "bit*": "BIT*"
    "abit*": "ABIT*"
    "fmt*": "FMT*"
    sst: SST
    spars: SPARS
    chomp: CHOMP
    stomp: STOMP
    trajopt: TrajOpt
    komo: KOMO
    gpmp: GPMP
    gpmp2: GPMP2
    itomp: ITOMP
    curobo: cuRobo
    vamp: VAMP
    ompl: OMPL
    klampt: Klampt
    moveit: MoveIt
    "moveit!": MoveIt
    sqp: SQP
    "sequential quadratic programming": SQP
    "gauss-newton": Gauss-Newton
    "levenberg-marquardt": Levenberg-Marquardt
    "sampling-based": Sampling-based
    "optimization-based": Optimization-based
  hardware:
    franka: Franka Emika Panda
    "franka panda": Franka Emika Panda
    "franka emika": Franka Emika Panda
    panda: Franka Emika Panda
    ur5e: Universal Robots UR5e
    ur10: Universal Robots UR10
    ur5: Universal Robots UR5
    "kuka iiwa": KUKA LBR iiwa
    kuka: KUKA LBR iiwa
    kinova: Kinova Gen3
    "kinova gen3": Kinova Gen3
    fetch: Fetch Robot
    pr2: PR2
    baxter: Rethink Baxter
    sawyer: Rethink Sawyer
    hsr: Toyota HSR
    mujoco: MuJoCo
    pybullet: PyBullet
    bullet: Bullet
    "isaac gym": Isaac Gym
    "isaac sim": Isaac Sim
    gazebo: Gazebo
    drake: Drake
    ros: ROS
  problem:
    "narrow passage": narrow-passage planning
    "narrow passages": narrow-passage planning
    "bug trap": narrow-passage planning
    "high dof": high-DoF motion planning
    "high-dof": high-DoF motion planning
    "dynamic obstacles": planning among dynamic obstacles
    "moving obstacles": planning among dynamic obstacles
    "collision avoidance": collision avoidance
    "collision-free": collision-free planning
    "trajectory optimization": trajectory optimization
    "trajectory smoothing": trajectory smoothing
    "kinodynamic": kinodynamic planning
    "manipulation planning": manipulation planning
    "asymptotic optimality": asymptotically optimal planning
    "asymptotically optimal": asymptotically optimal planning
    "real-time planning": real-time planning
    "cluttered": planning in clutter
    "cluttered environments": planning in clutter
