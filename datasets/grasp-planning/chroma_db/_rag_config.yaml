project_name: grasp-explorer
domain_context: 'Robotic grasp planning: computing how a robot should position its
  gripper to pick up objects. Methods vary by planning approach (sampling, regression,
  RL, analytical), gripper type, sensor input, scene complexity, and training paradigm
  (sim, real, or both).

  '
csv_path: datasets/csv-gp-combined.csv
name_column: Name
description_column: Description
link_column: Link(s)
embedding_model: all-MiniLM-L6-v2
embedding_dimensions: 384
chroma_persist_dir: /Users/surbhikapoor/Desktop/WPI/wpivis/domain-explorer/datasets/grasp-planning/chroma_db
collection_name: grasp_papers
parsing:
  backend: grobid
  docling_ocr: false
  docling_table_mode: inline
  docling_max_pages: 0
chunking:
  coarse_max_tokens: 800
  mid_min_tokens: 200
  mid_max_tokens: 800
  mid_overlap_ratio: 0.15
  fine_min_tokens: 50
  fine_max_tokens: 300
  semantic_similarity_threshold: 0.35
  strategies:
  - semantic
  domain_topics:
  - grasp planning
  - grasp detection
  - grasp synthesis
  - grasp pose
  - 6-DoF
  - 7-DoF
  - antipodal grasp
  - power grasp
  - precision grasp
